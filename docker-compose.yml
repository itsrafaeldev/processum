version: '3.9'

services:
  octapro-pg-container:
    image: postgres:15
    container_name: octapro-pg-container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: octapro_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dev-env:
    build: ./  # caminho do Dockerfile
    container_name: dev-env
    depends_on:
      - octapro-pg-container
    ports:
      - "5091:5091"   # .NET
      - "4200:4200"   # Angular
    volumes:
      - "/home/rafael/projetos-csharp/OctaPro:/app/backend"
      - "/home/rafael/projetos-csharp/OctaPro/Frontend/processum-frontend:/app/frontend"
    environment:
      DB_HOST: octapro-pg-container
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: octapro_db
    tty: true
    stdin_open: true

volumes:
  postgres_data:

