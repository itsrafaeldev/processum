<div
  class="hidden lg:flex fixed top-3 z-50 transition-all duration-300"
  [style.left]="(layoutService.sidebarState$ | async) ? 'calc(13rem - 13px)' : 'calc(3.5rem - 5px)'"
  (click)="layoutService.toggleSidebar()"
>
  <i-lucide
    [img]="!(layoutService.sidebarState$ | async) ? ChevronRight : ChevronLeft"
    class="text-white bg-primary-600 rounded-full border border-white hover:bg-primary-500 cursor-pointer"
  ></i-lucide>
</div>

<div class="h-full flex flex-col pt-10 items-start bg-primary-700">
  <ul class="menu w-full grow flex flex-col gap-1">

  <li *ngFor="let item of menu">

    <!-- ITEM PRINCIPAL -->
    <div
      class="group sidebar-item hover:bg-primary-500 cursor-pointer flex items-center gap-2"
      (click)="item.children ? toggleItem(item) : null"
      [routerLink]="!item.children ? item.route : null"
      routerLinkActive="active bg-primary-400"
    >
      <lucide-icon [name]="item.iconName" class="size-5 text-gray-400 group-hover:text-white group-[.active]:text-white"></lucide-icon>

      <span
        class="text-gray-300 group-hover:text-white group-[.active]:text-white text-[16px] transition-all duration-300 overflow-hidden whitespace-nowrap"
        [class.hidden]="!(layoutService.sidebarState$ | async)"
      >
        {{ item.label }}
      </span>
    </div>

    <!-- SUBMENU -->
    <ul *ngIf="item.children && item.open"
        class="ml-6 mt-1 flex flex-col gap-1">

      <li *ngFor="let child of item.children">
        <a
          class="text-gray-300 hover:text-white text-sm px-3 py-1 rounded hover:bg-primary-400 block"
          [routerLink]="child.route"
          routerLinkActive="active bg-primary-400"
        >
          {{ child.label }}
        </a>
      </li>

    </ul>

  </li>

</ul>
</div>
