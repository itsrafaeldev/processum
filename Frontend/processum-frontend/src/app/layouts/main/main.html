<main class="flex bg-primary-50" style="height: 100dvh">
  <!-- SIDEBAR -->
  <aside
    class="bg-white transition-all duration-300 flex-shrink-0 overflow-hidden"
    [class.w-64]="!(layoutService.sidebarState$ | async)"
    [class.w-14]="(layoutService.sidebarState$ | async) && isDesktop"
    [class.w-0]="(layoutService.sidebarState$ | async) && !isDesktop"
  >
    <app-sidebar></app-sidebar>
  </aside>

  <!-- CONTEÚDO -->
  <section class="flex-1 flex flex-col min-h-0 overflow-hidden">
    <!-- NAVBAR -->
    <div class="w-full flex-shrink-0" style="box-shadow: rgba(0, 0, 0, 0.1) 0px 0px 5px 0px, rgba(0, 0, 0, 0.1) 0px 0px 1px 0px;">
      <app-navbar></app-navbar>
    </div>

    <div class="flex-1 flex flex-col min-h-0">

      <!-- PAGE CONTENT -->
      <div class="flex flex-1 min-h-0 overflow-auto w-full p-6">
        <!-- wrapper interno para garantir altura completa -->
        <div class="flex flex-col flex-1 min-h-0 w-full">
          <router-outlet></router-outlet>
        </div>
      </div>

      <!-- FOOTER -->
      <footer class="h-10 flex-shrink-0 flex items-center justify-center bg-white text-black">
        <p>Versão 0.1 - 2026 ©</p>
      </footer>

    </div>

  </section>
</main>
