<div class="card">
  <div class="header">

    <div class="image">
      <i-lucide [img]="icon"></i-lucide>
    </div>

    <div class="content">
      <span class="title">{{ title }}</span>
      <p class="message">{{ subtitle }}</p>
    </div>

    <div class="actions">
      <button class="btn-cadastrar" type="button" (click)="onClick()">
        {{ buttonText }}
      </button>
    </div>

  </div>
</div>
